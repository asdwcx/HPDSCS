# TCP流代理配置 - 聊天服务器负载均衡
# 文件位置: /etc/nginx/stream.d/chat_stream.conf

# 主要聊天服务 - 使用最小连接数负载均衡
server {
    listen 8080;
    proxy_pass chat_servers_least_conn;
    
    # 代理超时设置
    proxy_timeout 1s;
    proxy_responses 1;
    proxy_bind $remote_addr transparent;
    
    # 连接超时
    proxy_connect_timeout 1s;
    
    # 会话保持
    proxy_socket_keepalive on;
}

# 备用聊天服务 - 使用主备模式
server {
    listen 8081;
    proxy_pass chat_servers_primary;
    
    # 代理超时设置
    proxy_timeout 3s;
    proxy_responses 1;
    
    # 连接超时
    proxy_connect_timeout 2s;
    
    # 会话保持
    proxy_socket_keepalive on;
}

# 高可用聊天服务 - 使用IP哈希
server {
    listen 8082;
    proxy_pass chat_servers_ip_hash;
    
    # 代理超时设置
    proxy_timeout 2s;
    proxy_responses 1;
    
    # 连接超时
    proxy_connect_timeout 1s;
    
    # 会话保持
    proxy_socket_keepalive on;
}

# 文件传输服务 - 专用端口和较长超时
server {
    listen 9090;
    proxy_pass chat_servers_round_robin;
    
    # 文件传输需要较长超时
    proxy_timeout 300s;
    proxy_responses 1;
    
    # 连接超时
    proxy_connect_timeout 5s;
    
    # 上传缓冲
    proxy_upload_rate 1m;
    proxy_download_rate 2m;
}

# SSL/TLS加密聊天服务
server {
    listen 8443 ssl;
    proxy_pass chat_servers_least_conn;
    
    # SSL证书配置
    ssl_certificate /etc/nginx/ssl/chat.crt;
    ssl_certificate_key /etc/nginx/ssl/chat.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    
    # 代理设置
    proxy_timeout 1s;
    proxy_responses 1;
    proxy_connect_timeout 1s;
    proxy_socket_keepalive on;
}
