# Nginx健康检查配置
# 文件位置: /etc/nginx/conf.d/health_check.conf

# 健康检查API端点
server {
    listen 80;
    server_name nginx-health.local;
    
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
    
    # 上游服务器状态检查
    location /upstream_status {
        access_log off;
        return 200 "upstream servers status check\n";
        add_header Content-Type text/plain;
    }
    
    # Nginx状态页面
    location /nginx_status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        allow 192.168.1.0/24;
        deny all;
    }
}

# 监控和管理接口
server {
    listen 8888;
    server_name admin.chat.local;
    
    # 基本认证
    auth_basic "Admin Area";
    auth_basic_user_file /etc/nginx/.htpasswd;
    
    location / {
        root /usr/share/nginx/html/admin;
        index index.html;
    }
    
    # 实时连接状态
    location /api/connections {
        access_log off;
        return 200 "active connections monitoring\n";
        add_header Content-Type application/json;
    }
    
    # 服务器池状态
    location /api/servers {
        access_log off;
        return 200 "server pool status\n";
        add_header Content-Type application/json;
    }
}
