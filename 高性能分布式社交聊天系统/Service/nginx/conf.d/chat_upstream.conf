# 聊天服务器上游配置
# 文件位置: /etc/nginx/conf.d/chat_upstream.conf

# 定义聊天服务器集群 - 主备模式
upstream chat_servers_primary {
    # 主服务器 - 高权重
    server 192.168.1.10:8000 weight=10 max_fails=3 fail_timeout=30s;
    
    # 备用服务器 - 只在主服务器失败时使用
    server 192.168.1.11:8000 weight=5 max_fails=3 fail_timeout=30s backup;
    server 192.168.1.12:8000 weight=5 max_fails=3 fail_timeout=30s backup;
    
    # 保持连接
    keepalive 32;
}

# 聊天服务器集群 - 最小连接数负载均衡
upstream chat_servers_least_conn {
    # 最小连接数算法
    least_conn;
    
    # 服务器池
    server 192.168.1.10:8000 weight=5 max_fails=3 fail_timeout=30s;
    server 192.168.1.11:8000 weight=3 max_fails=3 fail_timeout=30s;
    server 192.168.1.12:8000 weight=3 max_fails=3 fail_timeout=30s;
    server 192.168.1.13:8000 weight=2 max_fails=3 fail_timeout=30s;
    
    # 保持连接
    keepalive 32;
}

# 聊天服务器集群 - 轮询模式 (默认)
upstream chat_servers_round_robin {
    # 轮询算法 (默认)
    
    # 服务器池
    server 192.168.1.10:8000 weight=4 max_fails=3 fail_timeout=30s;
    server 192.168.1.11:8000 weight=3 max_fails=3 fail_timeout=30s;
    server 192.168.1.12:8000 weight=3 max_fails=3 fail_timeout=30s;
    server 192.168.1.13:8000 weight=2 max_fails=3 fail_timeout=30s;
    
    # 保持连接
    keepalive 32;
}

# IP哈希负载均衡 - 会话保持
upstream chat_servers_ip_hash {
    # IP哈希算法 - 确保同一IP总是连接到同一服务器
    ip_hash;
    
    server 192.168.1.10:8000 max_fails=3 fail_timeout=30s;
    server 192.168.1.11:8000 max_fails=3 fail_timeout=30s;
    server 192.168.1.12:8000 max_fails=3 fail_timeout=30s;
    server 192.168.1.13:8000 max_fails=3 fail_timeout=30s;
}
