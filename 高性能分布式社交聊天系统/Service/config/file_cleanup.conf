# 文件清理管理器配置文件
# File Cleanup Manager Configuration

[cleanup]
# 清理间隔（分钟）
interval_minutes = 30

# 临时文件过期时间（小时）
temp_file_expire_hours = 24

# 传输会话过期时间（小时）
session_expire_hours = 48

# 临时目录最大大小（字节）- 1GB
max_temp_dir_size = 1073741824

# 是否启用积极清理模式（当存储空间不足时）
enable_aggressive_cleanup = false

# 是否自动启动清理服务
auto_start = true

[directories]
# 需要清理的临时目录列表
temp_dir_1 = ./temp/
temp_dir_2 = ./uploads/temp/
temp_dir_3 = /tmp/file_transfer/

[logging]
# 清理日志文件路径
log_file = ./logs/file_cleanup.log

# 是否启用详细日志
verbose_logging = true

[alerts]
# 当清理失败次数超过此值时发送警告
max_failed_attempts = 5

# 当临时目录大小超过此阈值时发送警告（百分比）
size_warning_threshold = 80
