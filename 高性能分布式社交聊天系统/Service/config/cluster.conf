# 集群聊天服务器配置文件
# 生成时间: 2025-08-11

# ==================== 服务器基础配置 ====================
# 服务器监听端口
server.port=8000

# 服务器监听地址
server.host=0.0.0.0

# 最大连接数
server.max_connections=1000

# 线程池大小
server.thread_pool_size=4

# ==================== Redis 配置 ====================
# Redis服务器地址
redis.host=127.0.0.1

# Redis服务器端口
redis.port=6379

# Redis密码（如果没有密码请留空）
redis.password=

# Redis数据库编号
redis.db=0

# ==================== MySQL 配置 ====================
# MySQL服务器地址
mysql.host=127.0.0.1

# MySQL服务器端口
mysql.port=3306

# MySQL用户名
mysql.user=root

# MySQL密码
mysql.password=

# MySQL数据库名
mysql.database=chat

# ==================== 集群配置 ====================
# 服务器唯一ID（如果为空将自动生成）
cluster.server_id=

# 健康检查间隔（秒）
cluster.health_check_interval=10

# 最大失败次数（超过此次数将被标记为故障）
cluster.max_failures=3

# 负载均衡策略：round_robin, least_connections, least_load, random
cluster.load_balance_strategy=least_connections

# ==================== 文件传输配置 ====================
# 最大文件大小（字节，默认100MB）
file.max_size=104857600

# 文件分片大小（字节，默认64KB）
file.chunk_size=65536

# 文件上传路径
file.upload_path=./uploads

# ==================== 安全配置 ====================
# 启用SSL
security.enable_ssl=false

# SSL证书文件路径
security.cert_file=

# SSL私钥文件路径
security.key_file=

# 最大登录尝试次数
security.max_login_attempts=5

# ==================== 日志配置 ====================
# 日志级别：TRACE, DEBUG, INFO, WARN, ERROR, FATAL
log.level=INFO

# 日志文件路径
log.file_path=./logs/chat_server.log

# 日志文件最大大小（MB）
log.max_file_size=100

# 保留的日志文件数量
log.max_files=10

# ==================== 性能调优配置 ====================
# IO线程数量
performance.io_threads=2

# 工作线程数量
performance.worker_threads=4

# 连接超时时间（秒）
performance.connection_timeout=300

# 心跳间隔（秒）
performance.heartbeat_interval=30

# 消息队列最大长度
performance.message_queue_size=10000
